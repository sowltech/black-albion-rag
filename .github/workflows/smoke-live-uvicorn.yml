name: Live Uvicorn Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  live-uvicorn-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Run live uvicorn smoke test
        env:
          PYTHON: python
          BLACK_ALBION_PORT: "8765"
        run: bash scripts/smoke_live_uvicorn.sh
