name: Enterprise GPT OS Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-enterprise-gpt-os:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install validation dependencies
        run: python -m pip install PyYAML

      - name: Validate Enterprise GPT OS manifest
        run: bash scripts/validate_enterprise_gpt_os.sh
